<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelLogic AI</title>
    <meta name="description" content="Intelligent hostel management assistant.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <main class="hero">
        <div class="glass-panel" style="padding: 4rem; max-width: 800px; width: 90%;">
            <div style="background: var(--bot-msg-bg); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <i data-lucide="bot" style="color: var(--primary); width: 40px; height: 40px;"></i>
            </div>
            <h1 class="hero-title">HostelLogic AI</h1>
            <p class="hero-subtitle">
                Your intelligent companion for all things hostel-related. Experience seamless onboarding, rule clarifications, issue reporting, and mess service management, right at your fingertips.
            </p>
            <a href="chat.html" class="btn-primary">
                <span>Start Chatting</span>
                <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
            </a>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
